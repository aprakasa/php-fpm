name: Build and Push to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'conf/**'
      - '.github/workflows/**'
      - 'entrypoint.sh'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'conf/**'
      - '.github/workflows/**'
      - 'entrypoint.sh'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              truthy:
                check-keys: false
              document-start: disable

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ matrix.php-version }}
          cache-from: type=gha,scope=php${{ matrix.php-version }}
          cache-to: type=gha,scope=php${{ matrix.php-version }},mode=max
          build-args: PHP_VERSION=${{ matrix.php-version }}

      - name: Save image artifact
        run: docker save -o /tmp/image.tar ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ matrix.php-version }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.php-version }}
          path: /tmp/image.tar
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image-${{ matrix.php-version }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Smoke test
        run: |
          docker run -d --name smoke-test \
            -e MARIADB_DATABASE=test \
            -e MARIADB_USER=test \
            -e MARIADB_PASSWORD=testpw \
            -e MARIADB_ROOT_PASSWORD=rootpw \
            -e WORDPRESS_ADMIN_PASSWORD=adminpw \
            -e WORDPRESS_ADMIN_EMAIL=admin@test.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ matrix.php-version }}" || true
          sleep 3
          docker exec smoke-test php -m | grep -q redis && echo "PASS: redis extension loaded"
          docker exec smoke-test php -m | grep -q imagick && echo "PASS: imagick extension loaded"
          docker exec smoke-test php -m | grep -q opcache && echo "PASS: opcache extension loaded"
          docker exec smoke-test php -m | grep -q mysqli && echo "PASS: mysqli extension loaded"
          docker exec smoke-test php -m | grep -q gd && echo "PASS: gd extension loaded"
          docker exec smoke-test which wp && echo "PASS: wp-cli available"
          docker rm -f smoke-test

  scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image-${{ matrix.php-version }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Trivy vulnerability scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ matrix.php-version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-php-${{ matrix.php-version }}'

      - name: Trivy gate (block on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ matrix.php-version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  push:
    needs: [test, scan]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.php-version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}-${{ matrix.php-version }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.php-version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.php-version == '8.5' }}

      - name: Build and push multi-arch
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=php${{ matrix.php-version }}
          cache-to: type=gha,scope=php${{ matrix.php-version }},mode=max
          build-args: PHP_VERSION=${{ matrix.php-version }}

      - name: Save digest
        run: echo "${{ steps.build.outputs.digest }}" > /tmp/digest.txt

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.php-version }}
          path: /tmp/digest.txt
          retention-days: 1

  sign:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - name: Download digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.php-version }}
          path: /tmp

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify digest
        run: |
          DIGEST=$(cat /tmp/digest.txt)
          echo "Digest: ${DIGEST}"
          [ -n "${DIGEST}" ]

      - name: Sign image
        run: |
          DIGEST=$(cat /tmp/digest.txt)
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Verify signature
        run: |
          DIGEST=$(cat /tmp/digest.txt)
          cosign verify "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" \
            --certificate-identity-regexp \
            "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer \
            "https://token.actions.githubusercontent.com"

  cleanup:
    needs: sign
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune old untagged images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PKG="${{ github.repository }}"
          PKG="${PKG#*/}"
          echo "Pruning old untagged versions of $PKG (older than 7 days)"
          CUTOFF=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-7d '+%Y-%m-%dT%H:%M:%SZ')
          IDS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/$PKG/versions?per_page=100" \
            --jq ".[] | select(.metadata.container.tags | length == 0) | .id" \
            2>/dev/null || true)
          for VID in $IDS; do
            CREATED=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/users/$OWNER/packages/container/$PKG/versions/$VID" \
              --jq '.created_at' 2>/dev/null || echo "9999")
            if [[ "$CREATED" < "$CUTOFF" ]]; then
              echo "Deleting old untagged version $VID (created $CREATED)"
              gh api -X DELETE \
                -H "Accept: application/vnd.github+json" \
                "/users/$OWNER/packages/container/$PKG/versions/$VID" \
                || echo "WARN: failed to delete $VID"
            else
              echo "Keeping untagged version $VID (created $CREATED)"
            fi
          done
